<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 820px; height: 312px; overflow: hidden; background: #1a3d2e; }

  .cover {
    width: 820px;
    height: 312px;
    background: linear-gradient(135deg, #1a3d2e 0%, #2D6B52 50%, #1e4d38 100%);
    display: flex;
    align-items: center;
    position: relative;
    font-family: 'Georgia', 'Times New Roman', serif;
  }

  /* Subtle texture — circles in bg */
  .bg-circle-1 {
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    border: 1px solid rgba(240,234,224,0.06);
    right: -80px; top: -100px;
  }
  .bg-circle-2 {
    position: absolute;
    width: 280px; height: 280px;
    border-radius: 50%;
    border: 1px solid rgba(240,234,224,0.05);
    right: 60px; top: -60px;
  }
  .bg-circle-3 {
    position: absolute;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: rgba(201, 98, 42, 0.08);
    left: -40px; bottom: -60px;
  }

  /* Left: logo + name */
  .left {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 0 48px;
    flex-shrink: 0;
  }

  .logo-wrap {
    width: 88px; height: 88px;
    border-radius: 18px;
    background: #2D6B52;
    border: 2px solid rgba(240,234,224,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  .logo-wrap svg {
    width: 72px; height: 72px;
  }

  .brand {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .brand-name {
    font-size: 36px;
    font-weight: 700;
    color: #F0EAE0;
    letter-spacing: -0.5px;
    font-family: 'Georgia', serif;
  }

  .brand-sub {
    font-size: 13px;
    color: rgba(240,234,224,0.55);
    letter-spacing: 2.5px;
    text-transform: uppercase;
    font-family: 'Arial', sans-serif;
  }

  /* Divider */
  .divider {
    width: 1px;
    height: 120px;
    background: rgba(240,234,224,0.12);
    flex-shrink: 0;
    margin: 0 32px;
  }

  /* Right: tagline + features */
  .right {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding-right: 48px;
  }

  .tagline {
    font-size: 21px;
    color: #F0EAE0;
    line-height: 1.35;
    font-family: 'Georgia', serif;
  }

  .tagline em {
    font-style: italic;
    color: #E8A97A;
  }

  .features {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .pill {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid rgba(240,234,224,0.18);
    font-size: 11.5px;
    color: rgba(240,234,224,0.75);
    font-family: 'Arial', sans-serif;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }

  .pill.orange {
    background: rgba(201, 98, 42, 0.2);
    border-color: rgba(201, 98, 42, 0.4);
    color: #E8A97A;
  }

  .url {
    font-size: 14px;
    color: rgba(240,234,224,0.5);
    font-family: 'Arial', sans-serif;
    margin-top: 2px;
  }

  .url span {
    color: #E8A97A;
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="cover">
  <div class="bg-circle-1"></div>
  <div class="bg-circle-2"></div>
  <div class="bg-circle-3"></div>

  <div class="left">
    <div class="logo-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
        <rect width="200" height="200" rx="40" fill="#2D6B52"/>
        <line x1="58" y1="108" x2="100" y2="50" stroke="#F0EAE0" stroke-width="6" stroke-linecap="round"/>
        <line x1="142" y1="108" x2="100" y2="50" stroke="#F0EAE0" stroke-width="6" stroke-linecap="round"/>
        <circle cx="100" cy="50" r="7" fill="#C9622A"/>
        <circle cx="58" cy="88" r="13" fill="#F0EAE0"/>
        <line x1="58" y1="101" x2="58" y2="126" stroke="#F0EAE0" stroke-width="4.5" stroke-linecap="round"/>
        <line x1="58" y1="110" x2="36" y2="118" stroke="#F0EAE0" stroke-width="3.5" stroke-linecap="round"/>
        <line x1="58" y1="126" x2="46" y2="152" stroke="#F0EAE0" stroke-width="3.5" stroke-linecap="round"/>
        <line x1="58" y1="126" x2="70" y2="152" stroke="#F0EAE0" stroke-width="3.5" stroke-linecap="round"/>
        <circle cx="142" cy="88" r="13" fill="#F0EAE0"/>
        <line x1="142" y1="101" x2="142" y2="126" stroke="#F0EAE0" stroke-width="4.5" stroke-linecap="round"/>
        <line x1="142" y1="110" x2="164" y2="118" stroke="#F0EAE0" stroke-width="3.5" stroke-linecap="round"/>
        <line x1="142" y1="126" x2="130" y2="152" stroke="#F0EAE0" stroke-width="3.5" stroke-linecap="round"/>
        <line x1="142" y1="126" x2="154" y2="152" stroke="#F0EAE0" stroke-width="3.5" stroke-linecap="round"/>
        <circle cx="100" cy="114" r="11" fill="#C9622A"/>
        <line x1="100" y1="125" x2="100" y2="150" stroke="#C9622A" stroke-width="3.5" stroke-linecap="round"/>
        <line x1="100" y1="134" x2="86" y2="143" stroke="#C9622A" stroke-width="3" stroke-linecap="round"/>
        <line x1="100" y1="134" x2="114" y2="143" stroke="#C9622A" stroke-width="3" stroke-linecap="round"/>
        <line x1="100" y1="150" x2="90" y2="166" stroke="#C9622A" stroke-width="3" stroke-linecap="round"/>
        <line x1="100" y1="150" x2="110" y2="166" stroke="#C9622A" stroke-width="3" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="brand">
      <div class="brand-name">Family Nest</div>
      <div class="brand-sub">Private family app</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="right">
    <div class="tagline">Your family's memories,<br><em>private by design.</em></div>
    <div class="features">
      <div class="pill orange">Free to start</div>
      <div class="pill">Photos & journals</div>
      <div class="pill">Voice memos</div>
      <div class="pill">Recipes</div>
      <div class="pill">No ads. No strangers.</div>
    </div>
    <div class="url">Try it free at <span>familynest.io</span></div>
  </div>
</div>
</body>
</html>
